{{define "header"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{.Title}} · GoTok</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="topnav">
    <button type="button" id="menuToggle" class="menu-toggle" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    <a class="brand" href="/feed">📺 GoTok</a>
    <a class="topnav-action" href="/chat" aria-label="Chat">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </a>
  </nav>

  <aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="sidebar-header">
      <a class="brand" href="/feed">📺 GoTok</a>
      <button type="button" id="sidebarClose" class="sidebar-close" aria-label="Close menu">&times;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="/feed">Feed</a>
      <a href="/upload">Upload</a>
      <a href="/chat">💬 Chat</a>
      {{if .User}}
        <a class="nav-user" href="/u/{{.User.ID}}">{{.User.Name}}</a>
        <form action="/logout" method="post" class="logout-form">
          <button type="submit">Log out</button>
        </form>
      {{else}}
        <a href="/login">Log in</a>
      {{end}}
    </nav>
  </aside>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <script src="/static/js/nav.js"></script>

  <main>
{{end}}

{{define "footer"}}
  </main>
</body>
</html>
{{end}}
